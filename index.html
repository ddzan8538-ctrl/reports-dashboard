<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёты · Novi&Novikov</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

[data-theme="dark"]{
  --bg:#0d0f14;--surface:#13151c;--surface2:#1a1d27;--border:#222536;
  --blue:#4f8ef7;--pink:#f75fa0;--gold:#f7c948;--text:#e8eaf2;--muted:#6b6f85;
  --subtext:#9fa3b8;--grid:rgba(255,255,255,0.03);--shadow:rgba(0,0,0,0.4);
  --header-bg:rgba(13,15,20,0.97);
}
[data-theme="light"]{
  --bg:#f4f5f9;--surface:#ffffff;--surface2:#f0f1f6;--border:#dde0ea;
  --blue:#3a7ef5;--pink:#e84d8a;--gold:#d4a017;--text:#1a1d2e;--muted:#8890a8;
  --subtext:#555b72;--grid:rgba(0,0,0,0.04);--shadow:rgba(0,0,0,0.08);
  --header-bg:rgba(244,245,249,0.97);
}

body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;transition:background .2s,color .2s;}

/* ——— HEADER ——— */
.header{padding:14px 24px;background:var(--header-bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.logo{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}

.theme-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.theme-toggle-label{font-size:13px;color:var(--muted);}
.toggle-track{width:36px;height:20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;border-radius:50%;background:var(--muted);transition:all .2s;}
[data-theme="light"] .toggle-thumb{left:19px;background:var(--blue);}
[data-theme="light"] .toggle-track{background:rgba(58,126,245,.15);border-color:var(--blue);}

select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Geologica',sans-serif;cursor:pointer;max-width:140px;}

/* ——— NAVBAR ——— */
.nav-bar{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 24px;
  position:sticky;top:53px;z-index:99;backdrop-filter:blur(12px);}
.nav-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.nav-row:last-child{border-bottom:none;}
.nav-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;min-width:52px;font-weight:500;padding-top:9px;flex-shrink:0;}
.tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1;overflow:hidden;}
.tab{font-family:'Geologica',sans-serif;font-size:13px;padding:6px 12px;border-radius:7px;border:none;
  cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--surface2);color:var(--text);font-weight:500;}
[data-theme="light"] .tab.active{box-shadow:0 1px 4px var(--shadow);}
.tab:hover:not(.active){color:var(--text);background:var(--surface2);}

.date-inputs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.date-inputs input{background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Geologica',sans-serif;width:130px;}
.date-inputs input:focus{outline:none;border-color:var(--blue);}
.btn-apply{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:'Geologica',sans-serif;cursor:pointer;font-weight:500;}
.btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 10px;border-radius:8px;font-size:13px;font-family:'Geologica',sans-serif;cursor:pointer;}

/* ——— PERIOD BAR ——— */
.period-bar{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.period-title{font-size:14px;color:var(--subtext);}
.period-title span{color:var(--text);font-weight:500;}
.period-dates{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px;white-space:nowrap;}

/* ——— CONTAINER & KPI ——— */
.container{padding:0 16px 32px;max-width:1400px;margin:0 auto;}
@media(min-width:768px){.container{padding:0 24px 32px;}}
@media(min-width:1200px){.container{padding:0 32px 32px;}}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(3,1fr);gap:12px;}}
@media(min-width:900px){.kpi-grid{grid-template-columns:repeat(5,1fr);gap:14px;}}

.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;
  box-shadow:0 2px 8px var(--shadow);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.blue::before{background:var(--blue)}.kpi.pink::before{background:var(--pink)}
.kpi.green::before{background:#4ff7a0}.kpi.gold::before{background:var(--gold)}.kpi.purple::before{background:#a04ff7}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:500;}
.kpi-value{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;line-height:1;margin-bottom:4px;}
@media(min-width:600px){.kpi-value{font-size:26px;}}
.kpi.blue .kpi-value{color:var(--blue)}.kpi.pink .kpi-value{color:var(--pink)}
.kpi.green .kpi-value{color:#4ff7a0}.kpi.gold .kpi-value{color:var(--gold)}.kpi.purple .kpi-value{color:#a04ff7}
[data-theme="light"] .kpi.green .kpi-value{color:#27ae60}
.kpi-sub{font-size:11px;color:var(--muted);}

/* ——— GRID & CARD ——— */
.grid-2{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:14px;}
@media(min-width:900px){.grid-2{grid-template-columns:1fr 1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;
  box-shadow:0 2px 8px var(--shadow);}
@media(min-width:600px){.card{padding:20px;}}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:500;}

/* ——— MANAGER TABLE — десктоп ——— */
.manager-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.manager-row{display:grid;grid-template-columns:160px repeat(5,1fr);align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;min-width:480px;}
.manager-row:last-child{border-bottom:none}
.manager-row.hr{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding-bottom:8px;font-weight:500;}
.manager-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
.stat-val{text-align:center;font-family:'Unbounded',sans-serif;font-size:13px;}
.conv-val{text-align:center;}
.conv-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.conv-high{background:rgba(79,247,160,.15);color:#27ae60}
[data-theme="dark"] .conv-high{color:#4ff7a0}
.conv-mid{background:rgba(247,201,72,.15);color:var(--gold)}
.conv-low{background:rgba(247,95,160,.15);color:var(--pink)}

/* ——— TOP ——— */
.top-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.top-row:last-child{border-bottom:none}
.top-rank{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;width:28px;text-align:center;flex-shrink:0;}
.rank-1{color:var(--gold)}.rank-2{color:var(--muted)}.rank-3{color:#cd7f32}
.top-name{flex:1;font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-score{font-family:'Unbounded',sans-serif;font-size:13px;color:var(--blue);flex-shrink:0;}
.top-bar-wrap{width:50px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0;}
@media(min-width:600px){.top-bar-wrap{width:70px;}}
.top-bar{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--pink));}

/* ——— REASONS ——— */
.reason-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.reason-row:last-child{border-bottom:none}
.reason-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reason-count{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--pink);min-width:24px;text-align:right;flex-shrink:0;}
.reason-bar-wrap{width:40px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0;}
@media(min-width:600px){.reason-bar-wrap{width:60px;}}
.reason-bar{height:3px;border-radius:2px;background:var(--pink);}

canvas{max-height:210px;}

.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:var(--pink);text-align:center;padding:40px 20px;font-size:14px;line-height:1.8;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">NOVI&NOVIKOV · Отчёты</div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="theme-toggle-label" id="themeLabel">🌙</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
    <select id="managerFilter" onchange="render()">
      <option value="">Все менеджеры</option>
    </select>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-row"><span class="nav-label">Год</span><div class="tabs" id="tabYear"></div></div>
  <div class="nav-row"><span class="nav-label">Месяц</span><div class="tabs" id="tabMonth"></div></div>
  <div class="nav-row"><span class="nav-label">Неделя</span><div class="tabs" id="tabWeek"></div></div>
  <div class="nav-row" id="customRow" style="display:none">
    <span class="nav-label">Период</span>
    <div class="date-inputs">
      <input type="date" id="dateFrom">
      <span style="color:var(--muted)">—</span>
      <input type="date" id="dateTo">
      <button class="btn-apply" onclick="applyCustom()">Применить</button>
      <button class="btn-clear" onclick="clearCustom()">✕</button>
    </div>
  </div>
</div>

<div class="period-bar">
  <div class="period-title" id="pTitle"></div>
  <div class="period-dates" id="pDates" style="display:none"></div>
</div>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><br>Загружаем данные…</div>
</div>

<script>
// ——— НАСТРОЙКИ ———
const SHEET_ID = "11utOcxutki7LwdnJHa3ZeQJlZGjrrI0k83PUjHNhTRk";
const API_KEY  = "AIzaSyBXYRgDdMCnE-Y2I6z1zkGwwnupMMVh1jc";
// ————————————————

const MNAMES  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MSHORT  = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const fmtD    = d => d.toISOString().slice(0,10);
const fmtH    = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
const fmtF    = d => `${fmtH(d)}.${d.getFullYear()}`;

let ALL = [];
let sYear = null, sMonth = null, sWeek = null, weeksCache = [], customFrom = null, customTo = null;

// ——— ТЕМА ———
function toggleTheme(){
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.getElementById('themeLabel').textContent = isLight ? '🌙' : '☀️';
  render();
}
function isDark(){ return document.documentElement.getAttribute('data-theme') === 'dark'; }

// ——— ЗАГРУЗКА ИЗ GOOGLE SHEETS ———
async function fetchSheetData() {
  const range = encodeURIComponent("Отчёты!A:I");
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).values || [];
}

function parseRows(raw) {
  if (raw.length < 2) return [];
  return raw.slice(1).map(r => ({
    date:     r[0] || '',
    manager:  r[1] || '',
    requests: parseInt(r[2]) || 0,
    fittings: parseInt(r[3]) || 0,
    contact:  parseInt(r[4]) || 0,
    closed:   parseInt(r[5]) || 0,
    reasons:  r[6] || '',
    comment:  r[7] || '',
  })).filter(r => r.date && r.manager);
}

function populateManagerFilter(rows) {
  const sel = document.getElementById('managerFilter');
  const cur = sel.value;
  const names = [...new Set(rows.map(r => r.manager).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Все менеджеры</option>' +
    names.map(n => `<option ${n===cur?'selected':''} value="${n}">${n}</option>`).join('');
}

// ——— HELPERS ———
const sum  = (rows, f) => rows.reduce((s,r) => s + (r[f]||0), 0);
const grp  = (rows, k) => rows.reduce((a,r) => { (a[r[k]] = a[r[k]]||[]).push(r); return a; }, {});
const cvp  = (fit, req) => req ? Math.round(fit/req*100) : 0;
const cvc  = (fit, req) => { const p = req ? fit/req : 0; return p>=0.4?'conv-high':p>=0.2?'conv-mid':'conv-low'; };
function getMonday(d){ const day=d.getDay()||7, m=new Date(d); m.setDate(d.getDate()-day+1); return m; }

function buildWeeks(rows){
  const dates = [...new Set(rows.map(r=>r.date))].sort();
  if (!dates.length) return [];
  const weeks = []; let ws = getMonday(new Date(dates[0]));
  while(true){
    const we = new Date(ws); we.setDate(ws.getDate()+6);
    if (dates.some(d => d>=fmtD(ws) && d<=fmtD(we)))
      weeks.push({key:fmtD(ws), from:fmtD(ws), to:fmtD(we), fromD:new Date(ws), toD:new Date(we)});
    ws.setDate(ws.getDate()+7);
    if (fmtD(ws) > dates[dates.length-1]) break;
  }
  return weeks;
}

// ——— НАВИГАЦИЯ ———
function init(){
  const today = new Date();
  const cy = String(today.getFullYear());
  const cm = String(today.getMonth()+1).padStart(2,'0');
  const years = [...new Set(ALL.map(r=>r.date.slice(0,4)))].sort().reverse();
  sYear = years.includes(cy) ? cy : years[0];
  const yt = document.getElementById('tabYear');
  years.forEach(y => {
    yt.appendChild(mkBtn(y, y===sYear, () => { sYear=y; sMonth=null; sWeek=null; customFrom=null; customTo=null; rebuildMonths(null); render(); }));
  });
  rebuildMonths(cm);
}

function rebuildMonths(prefer){
  const el = document.getElementById('tabMonth'); el.innerHTML = '';
  const months = [...new Set(ALL.filter(r=>r.date.startsWith(sYear)).map(r=>r.date.slice(5,7)))].sort();
  if (!sMonth || !months.includes(sMonth))
    sMonth = months.includes(prefer) ? prefer : months[months.length-1];
  el.appendChild(mkBtn('Весь год', !sMonth, () => { sMonth=null; sWeek=null; customFrom=null; customTo=null; document.getElementById('customRow').style.display='none'; rebuildWeeks(); render(); }, ''));
  months.forEach(m => {
    el.appendChild(mkBtn(MSHORT[parseInt(m)-1], m===sMonth, () => { sMonth=m; sWeek=null; customFrom=null; customTo=null; document.getElementById('customRow').style.display='none'; rebuildWeeks(); render(); }, m));
  });
  rebuildWeeks(true);
}

function rebuildWeeks(autoSelect){
  const el = document.getElementById('tabWeek'); el.innerHTML = '';
  const prefix = sMonth ? `${sYear}-${sMonth}` : sYear;
  weeksCache = buildWeeks(ALL.filter(r=>r.date.startsWith(prefix)));
  if (autoSelect && weeksCache.length){
    const ts = fmtD(new Date());
    const cur = weeksCache.find(w => w.from<=ts && w.to>=ts);
    sWeek = cur ? cur.key : weeksCache[weeksCache.length-1].key;
  }
  if (sWeek && !weeksCache.find(w=>w.key===sWeek)) sWeek = null;
  el.appendChild(mkBtn(sMonth?'Весь месяц':'Весь год', !sWeek&&!customFrom, () => { sWeek=null; customFrom=null; customTo=null; document.getElementById('customRow').style.display='none'; render(); }, ''));
  weeksCache.forEach((w,i) => {
    el.appendChild(mkBtn(`Неделя ${i+1}`, !customFrom&&w.key===sWeek, () => { sWeek=w.key; customFrom=null; customTo=null; document.getElementById('customRow').style.display='none'; render(); }, w.key));
  });
  el.appendChild(mkBtn('Указать даты', !!customFrom, () => { document.getElementById('customRow').style.display='flex'; }, '__custom'));
}

function mkBtn(text, active, onclick, val){
  const b = document.createElement('button');
  b.className = 'tab' + (active?' active':'');
  b.textContent = text;
  if (val !== undefined) b.dataset.val = val;
  b.onclick = onclick;
  return b;
}

function applyCustom(){
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f || !t) return;
  customFrom=f; customTo=t; sWeek=null;
  document.querySelectorAll('#tabWeek .tab').forEach(b => b.classList.toggle('active', b.dataset.val==='__custom'));
  render();
}

function clearCustom(){
  customFrom=null; customTo=null;
  document.getElementById('customRow').style.display='none';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  render();
}

function syncTabs(){
  document.querySelectorAll('#tabYear .tab').forEach(b => b.classList.toggle('active', b.textContent===sYear));
  document.querySelectorAll('#tabMonth .tab').forEach(b => b.classList.toggle('active', sMonth?b.dataset.val===sMonth:b.dataset.val===''));
  if (!customFrom)
    document.querySelectorAll('#tabWeek .tab').forEach(b => b.classList.toggle('active', sWeek?b.dataset.val===sWeek:b.dataset.val===''));
}

function getRows(){
  let rows;
  if (customFrom && customTo){
    rows = ALL.filter(r => r.date>=customFrom && r.date<=customTo);
  } else {
    const prefix = sMonth ? `${sYear}-${sMonth}` : sYear;
    rows = ALL.filter(r => r.date.startsWith(prefix));
    if (sWeek){ const w=weeksCache.find(x=>x.key===sWeek); if(w) rows=rows.filter(r=>r.date>=w.from&&r.date<=w.to); }
  }
  const m = document.getElementById('managerFilter').value;
  return m ? rows.filter(r=>r.manager===m) : rows;
}

function updateSubtitle(){
  const ti=document.getElementById('pTitle'), di=document.getElementById('pDates');
  if (customFrom && customTo){
    ti.innerHTML=`Статистика за <span>указанный период</span>`;
    di.textContent=`${fmtF(new Date(customFrom+'T00:00'))} — ${fmtF(new Date(customTo+'T00:00'))}`;
    di.style.display='block'; return;
  }
  const parts=[sYear];
  if (sMonth) parts.push(MNAMES[parseInt(sMonth)-1]); else parts.push('весь год');
  if (sWeek){
    const w=weeksCache.find(x=>x.key===sWeek), idx=weeksCache.indexOf(w)+1;
    parts.push(`неделя ${idx}`);
    di.textContent=`${fmtF(w.fromD)} — ${fmtF(w.toD)}`; di.style.display='block';
  } else { di.style.display='none'; }
  ti.innerHTML=`Статистика за <span>${parts.join(', ')}</span>`;
}

// ——— ЦВЕТА ГРАФИКОВ ———
function cc(){ return isDark() ? {tick:'#6b6f85',grid:'rgba(255,255,255,0.04)'} : {tick:'#8890a8',grid:'rgba(0,0,0,0.06)'}; }

// ——— КОМПОНЕНТЫ ———
function kpis(rows){
  const req=sum(rows,'requests'), fit=sum(rows,'fittings'), con=sum(rows,'contact'), cls=sum(rows,'closed');
  return `<div class="kpi-grid">
    <div class="kpi blue"><div class="kpi-label">Новых заявок</div><div class="kpi-value">${req}</div><div class="kpi-sub">за период</div></div>
    <div class="kpi pink"><div class="kpi-label">Примерок</div><div class="kpi-value">${fit}</div><div class="kpi-sub">назначено</div></div>
    <div class="kpi green"><div class="kpi-label">Конверсия</div><div class="kpi-value">${cvp(fit,req)}%</div><div class="kpi-sub">примерки / заявки</div></div>
    <div class="kpi gold"><div class="kpi-label">На связи</div><div class="kpi-value">${con}</div><div class="kpi-sub">клиентов</div></div>
    <div class="kpi purple"><div class="kpi-label">Закрыто</div><div class="kpi-value">${cls}</div><div class="kpi-sub">не реализовано</div></div>
  </div>`;
}

function managerTable(rows){
  const byM = grp(rows,'manager');
  const items = Object.entries(byM).map(([n,rs]) => {
    const req=sum(rs,'requests'), fit=sum(rs,'fittings');
    return `<div class="manager-row">
      <div class="manager-name">${n}</div>
      <div class="stat-val" style="color:var(--blue)">${req}</div>
      <div class="stat-val" style="color:var(--pink)">${fit}</div>
      <div class="stat-val" style="color:var(--gold)">${sum(rs,'contact')}</div>
      <div class="stat-val" style="color:#a04ff7">${sum(rs,'closed')}</div>
      <div class="conv-val"><span class="conv-badge ${cvc(fit,req)}">${cvp(fit,req)}%</span></div>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-title">По менеджерам</div>
    <div class="manager-table-wrap">
      <div class="manager-row hr">
        <div>Имя</div><div style="text-align:center">Заявки</div>
        <div style="text-align:center">Примерки</div><div style="text-align:center">Связь</div>
        <div style="text-align:center">Закрыто</div><div style="text-align:center">Конв.</div>
      </div>${items||'<div style="color:var(--muted);padding:16px 0;font-size:13px">Нет данных за период</div>'}
    </div>
  </div>`;
}

function topManagers(rows){
  const byM = grp(rows,'manager');
  const ranked = Object.entries(byM).map(([n,rs])=>({name:n,score:sum(rs,'requests')})).sort((a,b)=>b.score-a.score).slice(0,5);
  const max = ranked[0]?.score||1;
  return `<div class="card"><div class="card-title">Топ по заявкам</div>`+
    (ranked.length ? ranked.map((m,i)=>`<div class="top-row">
      <div class="top-rank rank-${i+1}">${i+1}</div>
      <div class="top-name">${m.name}</div>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${Math.round(m.score/max*100)}%"></div></div>
      <div class="top-score">${m.score}</div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:12px 0">Нет данных</div>')+`</div>`;
}

function reasons(rows){
  const c = {};
  rows.forEach(r=>{ if(!r.reasons)return; r.reasons.split(',').forEach(x=>{ const k=x.trim().toLowerCase(); if(k)c[k]=(c[k]||0)+1; }); });
  const s = Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const max = s[0]?.[1]||1;
  return `<div class="card"><div class="card-title">Причины отказов</div>`+
    (s.length ? s.map(([r,n])=>`<div class="reason-row">
      <div class="reason-name">${r}</div>
      <div class="reason-bar-wrap"><div class="reason-bar" style="width:${Math.round(n/max*100)}%"></div></div>
      <div class="reason-count">${n}</div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:12px 0">Нет данных</div>')+`</div>`;
}

function dynChart(rows){
  const byD=grp(rows,'date'), dates=Object.keys(byD).sort(), id='c1'+Date.now(), c=cc();
  setTimeout(()=>{
    const ctx=document.getElementById(id); if(!ctx)return;
    new Chart(ctx,{type:'line',data:{labels:dates.map(d=>d.slice(5)),datasets:[
      {label:'Заявки',  data:dates.map(d=>sum(byD[d],'requests')), borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,.1)',tension:.3,fill:true,pointRadius:2},
      {label:'Примерки',data:dates.map(d=>sum(byD[d],'fittings')), borderColor:'#f75fa0',backgroundColor:'rgba(247,95,160,.08)',tension:.3,fill:true,pointRadius:2},
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:c.tick,font:{size:12}}}},
      scales:{x:{ticks:{color:c.tick,font:{size:11},maxTicksLimit:12},grid:{color:c.grid}},
              y:{ticks:{color:c.tick,font:{size:11}},grid:{color:c.grid},beginAtZero:true}}}});
  },50);
  return `<div class="card"><div class="card-title">Динамика по дням</div><canvas id="${id}" height="210"></canvas></div>`;
}

function barChart(rows){
  const byM=grp(rows,'manager'), names=Object.keys(byM), id='c2'+Date.now(), c=cc();
  setTimeout(()=>{
    const ctx=document.getElementById(id); if(!ctx)return;
    new Chart(ctx,{type:'bar',data:{labels:names,datasets:[
      {label:'Заявки',  data:names.map(n=>sum(byM[n],'requests')), backgroundColor:'rgba(79,142,247,.7)',borderRadius:4},
      {label:'Примерки',data:names.map(n=>sum(byM[n],'fittings')), backgroundColor:'rgba(247,95,160,.7)',borderRadius:4},
      {label:'Закрыто', data:names.map(n=>sum(byM[n],'closed')),   backgroundColor:'rgba(247,201,72,.5)',borderRadius:4},
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:c.tick,font:{size:12}}}},
      scales:{x:{ticks:{color:c.tick,font:{size:11}},grid:{color:c.grid}},
              y:{ticks:{color:c.tick,font:{size:11}},grid:{color:c.grid},beginAtZero:true}}}});
  },50);
  return `<div class="card"><div class="card-title">Сравнение менеджеров</div><canvas id="${id}" height="210"></canvas></div>`;
}

function render(){
  syncTabs(); updateSubtitle();
  const rows = getRows();
  document.getElementById('app').innerHTML =
    kpis(rows) + managerTable(rows) +
    `<div class="grid-2">` + dynChart(rows) + barChart(rows) + `</div>` +
    `<div class="grid-2">` + topManagers(rows) + reasons(rows) + `</div>`;
}

// ——— СТАРТ ———
async function loadData(){
  try {
    const raw = await fetchSheetData();
    ALL = parseRows(raw);
    populateManagerFilter(ALL);
    init();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="error">⚠️ Ошибка загрузки данных<br><small>${e.message}</small><br><br><small>Проверь SHEET_ID и API_KEY</small></div>`;
  }
}

loadData();
</script>
</body>
</html>
