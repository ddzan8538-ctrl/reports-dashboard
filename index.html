<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёты · White Space</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14;
  --surface: #13151c;
  --surface2: #1a1d27;
  --border: #222536;
  --blue: #4f8ef7;
  --pink: #f75fa0;
  --gold: #f7c948;
  --text: #e8eaf2;
  --muted: #6b6f85;
  --grid: rgba(255,255,255,0.03);
}

body {
  font-family: 'Geologica', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* HEADER */
.header {
  padding: 20px 32px;
  background: rgba(13,15,20,0.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* PERIOD TABS */
.tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; }
.tab {
  font-family: 'Geologica', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all .2s;
}
.tab.active { background: var(--surface2); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

/* DATE PICKERS */
.date-range { display: flex; gap: 8px; align-items: center; }
.date-range input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Geologica', sans-serif;
  cursor: pointer;
}
.date-range input:focus { outline: none; border-color: var(--blue); }

/* MANAGER FILTER */
select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Geologica', sans-serif;
  cursor: pointer;
}

/* MAIN */
.container { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
@media(max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
@media(max-width: 600px)  { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.kpi.blue::before  { background: var(--blue); }
.kpi.pink::before  { background: var(--pink); }
.kpi.gold::before  { background: var(--gold); }
.kpi.green::before { background: #4ff7a0; }
.kpi.purple::before{ background: #a04ff7; }

.kpi-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}
.kpi-value {
  font-family: 'Unbounded', sans-serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}
.kpi.blue  .kpi-value { color: var(--blue); }
.kpi.pink  .kpi-value { color: var(--pink); }
.kpi.gold  .kpi-value { color: var(--gold); }
.kpi.green .kpi-value { color: #4ff7a0; }
.kpi.purple .kpi-value{ color: #a04ff7; }
.kpi-sub { font-size: 11px; color: var(--muted); }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media(max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}
.card-title {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 18px;
}

/* MANAGER TABLE */
.manager-row {
  display: grid;
  grid-template-columns: 140px repeat(5, 1fr);
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.manager-row:last-child { border-bottom: none; }
.manager-row.header-row { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding-bottom: 8px; }
.manager-name { font-weight: 500; }
.stat-val { text-align: center; font-family: 'Unbounded', sans-serif; font-size: 13px; }
.conv-val { text-align: center; }
.conv-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.conv-high { background: rgba(79,247,160,.15); color: #4ff7a0; }
.conv-mid  { background: rgba(247,201,72,.15);  color: var(--gold); }
.conv-low  { background: rgba(247,95,160,.15);  color: var(--pink); }

/* TOP MANAGERS */
.top-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.top-row:last-child { border-bottom: none; }
.top-rank {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px;
  font-weight: 700;
  width: 32px;
  text-align: center;
}
.rank-1 { color: var(--gold); }
.rank-2 { color: var(--muted); }
.rank-3 { color: #cd7f32; }
.top-name { flex: 1; font-weight: 500; font-size: 14px; }
.top-score {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  color: var(--blue);
}
.top-bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 2px; }
.top-bar { height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--pink)); }

/* REASONS */
.reason-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.reason-row:last-child { border-bottom: none; }
.reason-name { flex: 1; color: var(--text); }
.reason-count {
  font-family: 'Unbounded', sans-serif;
  font-size: 12px;
  color: var(--pink);
  min-width: 28px;
  text-align: right;
}
.reason-bar-wrap { width: 60px; height: 3px; background: var(--border); border-radius: 2px; }
.reason-bar { height: 3px; border-radius: 2px; background: var(--pink); }

/* CHART */
canvas { max-height: 220px; }

/* LOADING / ERROR */
.loading {
  text-align: center;
  padding: 80px;
  color: var(--muted);
  font-size: 13px;
}
.loading::before { content: '⟳ '; }
.error { color: var(--pink); text-align: center; padding: 60px; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">WHITE·SPACE · Отчёты</div>
  <div class="header-right">
    <div class="tabs">
      <button class="tab active" onclick="setPeriod('week')">Неделя</button>
      <button class="tab" onclick="setPeriod('month')">Месяц</button>
      <button class="tab" onclick="setPeriod('year')">Год</button>
      <button class="tab" onclick="setPeriod('custom')">Период</button>
    </div>
    <div class="date-range" id="customRange" style="display:none">
      <input type="date" id="dateFrom">
      <span style="color:var(--muted)">—</span>
      <input type="date" id="dateTo">
    </div>
    <select id="managerFilter" onchange="renderDashboard(filterRows(allRows))">
      <option value="">Все менеджеры</option>
    </select>
  </div>
</div>

<div class="container">
  <div id="app"><div class="loading">Загружаем данные</div></div>
</div>

<script>
// ——— НАСТРОЙКИ ———
const SHEET_ID = "YOUR_GOOGLE_SHEET_ID";
const API_KEY  = "YOUR_GOOGLE_API_KEY";
// ————————————————

let allRows = [];
let currentPeriod = 'week';

// ——— ПЕРИОД ———
function setPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['week','month','year','custom'][i] === p);
  });
  document.getElementById('customRange').style.display = p === 'custom' ? 'flex' : 'none';
  renderDashboard(filterRows(allRows));
}

function getPeriodDates() {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  if (currentPeriod === 'week') {
    const day = today.getDay() || 7;
    const mon = new Date(today); mon.setDate(today.getDate() - day + 1);
    return { from: fmt(mon), to: fmt(today) };
  }
  if (currentPeriod === 'month') {
    return { from: fmt(new Date(today.getFullYear(), today.getMonth(), 1)), to: fmt(today) };
  }
  if (currentPeriod === 'year') {
    return { from: fmt(new Date(today.getFullYear(), 0, 1)), to: fmt(today) };
  }
  return {
    from: document.getElementById('dateFrom').value || '2020-01-01',
    to:   document.getElementById('dateTo').value   || fmt(today),
  };
}

// ——— ЗАГРУЗКА ———
async function fetchSheetData() {
  const range = encodeURIComponent("Отчёты!A:I");
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).values || [];
}

function parseRows(raw) {
  if (raw.length < 2) return [];
  return raw.slice(1).map(r => ({
    date:     r[0] || '',
    manager:  r[1] || '',
    requests: parseInt(r[2]) || 0,
    fittings: parseInt(r[3]) || 0,
    contact:  parseInt(r[4]) || 0,
    closed:   parseInt(r[5]) || 0,
    reasons:  r[6] || '',
    comment:  r[7] || '',
  }));
}

function filterRows(rows) {
  const { from, to } = getPeriodDates();
  const manager = document.getElementById('managerFilter').value;
  return rows.filter(r => {
    if (r.date < from || r.date > to) return false;
    if (manager && r.manager !== manager) return false;
    return true;
  });
}

function populateManagerFilter(rows) {
  const sel = document.getElementById('managerFilter');
  const cur = sel.value;
  const names = [...new Set(rows.map(r => r.manager).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Все менеджеры</option>' +
    names.map(n => `<option ${n===cur?'selected':''} value="${n}">${n}</option>`).join('');
}

// ——— HELPERS ———
const sum = (rows, f) => rows.reduce((s,r) => s + (r[f]||0), 0);

function groupBy(rows, key) {
  return rows.reduce((a,r) => { (a[r[key]] = a[r[key]]||[]).push(r); return a; }, {});
}

function conv(fittings, requests) {
  if (!requests) return '—';
  return Math.round(fittings / requests * 100) + '%';
}
function convClass(fittings, requests) {
  if (!requests) return '';
  const p = fittings / requests;
  if (p >= 0.4) return 'conv-high';
  if (p >= 0.2) return 'conv-mid';
  return 'conv-low';
}

// ——— RENDER ———
function renderKPIs(rows) {
  const req  = sum(rows,'requests');
  const fit  = sum(rows,'fittings');
  const con  = sum(rows,'contact');
  const cls  = sum(rows,'closed');
  const cvr  = req ? Math.round(fit/req*100) : 0;
  return `<div class="kpi-grid">
    <div class="kpi blue"><div class="kpi-label">Новых заявок</div><div class="kpi-value">${req}</div><div class="kpi-sub">за период</div></div>
    <div class="kpi pink"><div class="kpi-label">Примерок</div><div class="kpi-value">${fit}</div><div class="kpi-sub">назначено</div></div>
    <div class="kpi green"><div class="kpi-label">Конверсия</div><div class="kpi-value">${cvr}%</div><div class="kpi-sub">примерки / заявки</div></div>
    <div class="kpi gold"><div class="kpi-label">На связи</div><div class="kpi-value">${con}</div><div class="kpi-sub">клиентов</div></div>
    <div class="kpi purple"><div class="kpi-label">Закрыто</div><div class="kpi-value">${cls}</div><div class="kpi-sub">не реализовано</div></div>
  </div>`;
}

function renderManagerTable(rows) {
  const byM = groupBy(rows, 'manager');
  const items = Object.entries(byM).map(([name, rs]) => {
    const req = sum(rs,'requests'), fit = sum(rs,'fittings');
    return `<div class="manager-row">
      <div class="manager-name">${name}</div>
      <div class="stat-val" style="color:var(--blue)">${req}</div>
      <div class="stat-val" style="color:var(--pink)">${fit}</div>
      <div class="stat-val" style="color:var(--gold)">${sum(rs,'contact')}</div>
      <div class="stat-val" style="color:#a04ff7">${sum(rs,'closed')}</div>
      <div class="conv-val"><span class="conv-badge ${convClass(fit,req)}">${conv(fit,req)}</span></div>
    </div>`;
  }).join('');
  return `<div class="card" style="margin-bottom:20px">
    <div class="card-title">По менеджерам</div>
    <div class="manager-row header-row">
      <div>Имя</div><div style="text-align:center">Заявки</div>
      <div style="text-align:center">Примерки</div><div style="text-align:center">Связь</div>
      <div style="text-align:center">Закрыто</div><div style="text-align:center">Конверсия</div>
    </div>
    ${items}
  </div>`;
}

function renderTop(rows) {
  const byM = groupBy(rows, 'manager');
  const ranked = Object.entries(byM)
    .map(([name, rs]) => ({ name, score: sum(rs,'requests') }))
    .sort((a,b) => b.score - a.score)
    .slice(0,5);
  const max = ranked[0]?.score || 1;
  const items = ranked.map((m,i) => `
    <div class="top-row">
      <div class="top-rank rank-${i+1}">${i+1}</div>
      <div class="top-name">${m.name}</div>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${Math.round(m.score/max*100)}%"></div></div>
      <div class="top-score">${m.score}</div>
    </div>`).join('');
  return `<div class="card"><div class="card-title">Топ по заявкам</div>${items}</div>`;
}

function renderReasons(rows) {
  const counts = {};
  rows.forEach(r => {
    if (!r.reasons) return;
    r.reasons.split(',').forEach(reason => {
      const k = reason.trim().toLowerCase();
      if (k) counts[k] = (counts[k]||0) + 1;
    });
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if (!sorted.length) return `<div class="card"><div class="card-title">Причины отказов</div><div style="color:var(--muted);font-size:13px;padding:20px 0">Нет данных</div></div>`;
  const max = sorted[0][1];
  const items = sorted.map(([reason, cnt]) => `
    <div class="reason-row">
      <div class="reason-name">${reason}</div>
      <div class="reason-bar-wrap"><div class="reason-bar" style="width:${Math.round(cnt/max*100)}%"></div></div>
      <div class="reason-count">${cnt}</div>
    </div>`).join('');
  return `<div class="card"><div class="card-title">Причины отказов</div>${items}</div>`;
}

function renderDynamicsChart(rows) {
  const byDate = groupBy(rows, 'date');
  const dates = Object.keys(byDate).sort();
  const id = 'ch_' + Date.now();
  setTimeout(() => {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates.map(d => d.slice(5)),
        datasets: [
          { label: 'Заявки',   data: dates.map(d=>sum(byDate[d],'requests')), borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,.1)', tension:.3, fill:true, pointRadius:3 },
          { label: 'Примерки', data: dates.map(d=>sum(byDate[d],'fittings')), borderColor: '#f75fa0', backgroundColor: 'rgba(247,95,160,.08)', tension:.3, fill:true, pointRadius:3 },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#6b6f85', font:{size:11,family:'Geologica'} } } },
        scales:{
          x:{ ticks:{color:'#6b6f85',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'} },
          y:{ ticks:{color:'#6b6f85',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, beginAtZero:true },
        }
      }
    });
  }, 50);
  return `<div class="card"><div class="card-title">Динамика по дням</div><canvas id="${id}" height="220"></canvas></div>`;
}

function renderConvChart(rows) {
  const byM = groupBy(rows, 'manager');
  const names = Object.keys(byM);
  const id = 'ch2_' + Date.now();
  setTimeout(() => {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: names,
        datasets: [
          { label:'Заявки',   data:names.map(n=>sum(byM[n],'requests')), backgroundColor:'rgba(79,142,247,.7)',  borderRadius:4 },
          { label:'Примерки', data:names.map(n=>sum(byM[n],'fittings')), backgroundColor:'rgba(247,95,160,.7)',  borderRadius:4 },
          { label:'Закрыто',  data:names.map(n=>sum(byM[n],'closed')),   backgroundColor:'rgba(247,201,72,.5)', borderRadius:4 },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#6b6f85', font:{size:11,family:'Geologica'} } } },
        scales:{
          x:{ ticks:{color:'#6b6f85',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'} },
          y:{ ticks:{color:'#6b6f85',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, beginAtZero:true },
        }
      }
    });
  }, 50);
  return `<div class="card"><div class="card-title">Сравнение менеджеров</div><canvas id="${id}" height="220"></canvas></div>`;
}

function renderDashboard(rows) {
  document.getElementById('app').innerHTML =
    renderKPIs(rows) +
    renderManagerTable(rows) +
    `<div class="grid-2">` + renderDynamicsChart(rows) + renderConvChart(rows) + `</div>` +
    `<div class="grid-2">` + renderTop(rows) + renderReasons(rows) + `</div>`;
}

async function loadData() {
  try {
    const raw = await fetchSheetData();
    allRows = parseRows(raw);
    populateManagerFilter(allRows);
    document.getElementById('dateFrom').addEventListener('change', () => renderDashboard(filterRows(allRows)));
    document.getElementById('dateTo').addEventListener('change',   () => renderDashboard(filterRows(allRows)));
    renderDashboard(filterRows(allRows));
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="error">Ошибка загрузки:<br>${e.message}<br><small>Проверь SHEET_ID и API_KEY</small></div>`;
  }
}

loadData();
</script>
</body>
</html>
